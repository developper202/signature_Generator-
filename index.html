<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF Signature</title>
</head>

<body>

<form>
    <h1>SF Trade Signature Generator Tool</h1>

    <label>Full name:</label><br>
    <input type="text" id="nom" placeholder="Entrer your full name"><br><br>

    <label>Title:</label><br>
    <input type="text" id="titre" placeholder="Entrer your title" ><br><br>

    <label>Mobile Phone:</label><br>
    <input type="tel" id="tele" placeholder="Entrer your phone"><br><br>

    <label>Email Address:</label><br>
    <input type="email" id="email" placeholder="Entrer your email Address"><br><br>
    <button>Download</button>
</form>
 


<div id="signature-card">
   


    <div class="top-section">
        <div class="logo">
            <img src="sf_tangier.png" alt="SF Logo">
        </div>

        <div class="info">
      <h2 id="display-name">FULL NAME</h2>
      <div class="title" id="display-title">Title</div>
      
           <div class="contact">
    <img src="Sans titre.png" alt="tele">
    <span id="display-tel">+212</span>
</div>

            <div class="contactemail">
                <img src="email.png" alt="email">
                <span id="display-email"></span>
            </div>

            <div class="contact">
                
               <a href="https://www.sf-tangier.com">www.sf-tangier.com</a>
            </div>
        </div>
    </div>

    <div class="bottom-line"></div>

    <div id="location">
        <img src="location.png" alt="location">
        <span>
            TAC2 module 11-12 / TAC1 module 1-2 <br>
            Tangier Automotive City <br>
            Tangier, Morocco
        </span>
    </div>
<script src="signateure.js"></script>
</div>

</body>
</html>
